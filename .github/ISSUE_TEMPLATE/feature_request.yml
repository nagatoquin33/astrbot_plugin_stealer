name: 💡 功能建议
description: 为表情包小偷提出新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出功能建议！好的想法会让插件变得更好玩 ✨
        提交前请先搜索一下有没有类似的 Issue，避免重复。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issue，没有相同的建议
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景 / 你遇到的问题
      description: 这个功能要解决什么问题？或者当前体验中有什么不方便的地方？
      placeholder: 例如：每次想看某个情绪分类下有多少表情，只能去 WebUI 查，不能直接用指令查询……
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望这个功能怎么工作？
      placeholder: 例如：希望增加 `/meme list <分类>` 指令，直接在聊天中返回该分类的表情数量和缩略图列表
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案（可选）
      description: 有没有其他实现方式？或者你自己尝试过什么临时解法？

  - type: dropdown
    id: area
    attributes:
      label: 涉及的功能模块
      multiple: true
      options:
        - 表情包收集 / 偷图
        - 表情包发送 / 自动回复
        - 情绪分析 / 分类
        - WebUI
        - 指令系统
        - 配置项
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 你觉得这个功能有多重要？
      options:
        - 🔥 非常需要，没有它体验很差
        - 👍 挺有用，但不是必须的
        - 💭 只是个小想法，随缘
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 其他补充
      description: 参考截图、相关项目链接、或其他你认为有帮助的信息
