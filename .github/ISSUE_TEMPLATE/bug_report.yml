name: 🐛 Bug 报告
description: 报告一个问题，帮助我们改进插件
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你愿意提交 Bug 报告！填写时尽量详细，有助于更快定位问题。
        > ⚠️ 请先确认你使用的是最新版本，并已阅读 README 的配置说明。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issue，没有相同的问题
          required: true
        - label: 我已更新到最新版本
          required: true
        - label: 我已阅读过 README 的相关配置说明
          required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述你遇到的问题
      placeholder: 例如：开启偷图功能后，发送图片没有反应，也没有入库……
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 执行指令 `/meme on`
        2. 在群聊中发送一张图片
        3. 执行 `/meme status` 查看
        4. 发现表情包数量没有增加
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
      placeholder: 图片应该被自动收录并分类到对应情绪
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 图片没有被收录，status 显示数量为 0
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: 当前使用的发送模式
      options:
        - LLM 模式（默认）
        - 被动标签模式
        - 不确定
    validations:
      required: true

  - type: input
    id: vision_provider
    attributes:
      label: 视觉模型 Provider ID
      description: 执行 `/meme status` 可查看
      placeholder: 例如：doubao / gemini / qwenvl

  - type: textarea
    id: logs
    attributes:
      label: 错误日志 / 报错信息
      description: 请粘贴相关的 AstrBot 日志，用代码块格式包裹
      render: shell
      placeholder: |
        [2026-03-15 12:00:00] ERROR - ...

  - type: textarea
    id: config
    attributes:
      label: 相关配置（可选）
      description: 粘贴你修改过的配置项（注意去掉任何敏感信息）
      render: json

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 填写你的运行环境信息
      placeholder: |
        - 操作系统: Windows 11 / Ubuntu 22.04
        - Python 版本: 3.10.x
        - AstrBot 版本: x.x.x
        - 插件版本 / commit hash:
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 其他补充信息
      description: 截图、相关 PR、或其他你认为有帮助的信息
